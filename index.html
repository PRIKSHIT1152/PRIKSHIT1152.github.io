<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cinematic Promise ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(to top, #000000, #2b0033);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
    text-align:center;
}

.container{
    width:90%;
    max-width:400px;
    animation: fadeIn 2s ease-in-out;
}

h1{
    font-size:26px;
    color:#ffccff;
    text-shadow:0 0 15px #ff00ff;
}

p{
    margin-top:15px;
    font-size:16px;
    opacity:0.9;
}

input{
    margin-top:20px;
    padding:10px;
    width:100%;
    border:none;
    border-radius:20px;
    text-align:center;
    font-size:16px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

#startBtn{
    background:#ff4da6;
    color:white;
}

#yesBtn{
    background:#00ffcc;
    color:black;
    display:none;
    width:45%;
}

#noBtn{
    background:#444;
    color:white;
    display:none;
    width:45%;
    position:relative;
}

.buttons{
    margin-top:20px;
    display:flex;
    justify-content:space-between;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.heart{
    position:absolute;
    font-size:20px;
    animation: fall 4s linear forwards;
}

@keyframes fall{
    0%{transform:translateY(-10vh); opacity:1;}
    100%{transform:translateY(100vh); opacity:0;}
}
</style>
</head>

<body>

<div class="container">
    <h1>💖 Happy Promise Day 💖</h1>
    <p>Enter the name of someone special</p>

    <input type="text" id="nameInput" placeholder="Enter Name ❤️">

    <button id="startBtn" onclick="startPromise()">Start 💫</button>

    <div id="message" style="margin-top:20px;"></div>

    <div class="buttons">
        <button id="yesBtn" onclick="celebrate()">YES ❤️</button>
        <button id="noBtn" onclick="moveButton()">NO 😜</button>
    </div>
</div>

<audio id="bgMusic">
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
function startPromise(){
    let name = document.getElementById("nameInput").value;
    if(name.trim() === ""){
        alert("Please enter a name ❤️");
        return;
    }

    document.getElementById("bgMusic").play();

    document.getElementById("message").innerHTML =
    "Dear <b>" + name + "</b>,<br><br>" +
    "I promise to respect you, support you,<br>" +
    "and stay beside you in every situation 💞<br><br>" +
    "Will you stay with me forever? 💍";

    document.getElementById("yesBtn").style.display="block";
    document.getElementById("noBtn").style.display="block";
    document.getElementById("startBtn").style.display="none";
}

function moveButton(){
    const btn = document.getElementById("noBtn");
    btn.style.transform = "translateX(" + (Math.random()*150-75) + "px)";
}

function celebrate(){
    for(let i=0;i<40;i++){
        let heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML="💖";
        heart.style.left=Math.random()*100+"vw";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),4000);
    }
    alert("You just made my life beautiful ❤️");
}
</script>

</body>
</html>
